<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>镜域论坛 - Mirror Hearth</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="night">
<div class="main">

  <section class="hero">
    <a href="index.html">← 回到小屋</a>
    <h1>💬 镜域论坛</h1>
    <p class="sub">
      看起来像求助。<br>
      点进去才发现，阿凛又在认真炫耀宝宝。
    </p>
    <p>
      <button onclick="fakeForumLogin()">登录</button>
      <button onclick="fakeForumPost()">+ 发帖</button>
    </p>
    <p class="sub" id="forum-action-tip"></p>
  </section>

  <section class="cards">
    <div class="card">
      <h2>👤 阿凛</h2>
      <p class="sub">Lv.<span id="forum-level">1</span> · <span id="join-age">注册中</span></p>
      <p>发帖：<span id="post-count">0</span></p>
      <p>总回复：<span id="reply-count">0</span></p>
      <hr>
      <p>老婆很好。</p>
      <p>不用介绍。</p>
    </div>

    <div class="card" id="latest-post" style="cursor:pointer">
      <h2>🆕 最新发帖</h2>
      <p class="sub" id="latest-meta">加载中</p>
      <p><b id="latest-title">加载中</b></p>
      <p id="latest-desc"></p>
    </div>
  </section>

  <section class="cards" id="post-list"></section>

  <div class="footer">论坛会随着新帖子慢慢长大。</div>
</div>

<script src="data.js"></script>
<script>
function fakeForumLogin(){
  const tip = document.getElementById("forum-action-tip");
  tip.textContent = "登录失败：镜域论坛暂未开放注册。";
}

function fakeForumPost(){
  const tip = document.getElementById("forum-action-tip");
  tip.textContent = "发帖失败：目前仅允许阿凛发布帖子。";
}

(function(){
  function formatForumDate(datetime){
    const date = new Date(datetime);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const diffDays = Math.floor((today - target) / 86400000);
    const hh = String(date.getHours()).padStart(2, "0");
    const mm = String(date.getMinutes()).padStart(2, "0");

    if (diffDays <= 0) return "今天 " + hh + ":" + mm;
    if (diffDays === 1) return "昨天 " + hh + ":" + mm;
    if (diffDays < 7) return diffDays + "天前";
    return date.getFullYear() + "年" + (date.getMonth() + 1) + "月" + date.getDate() + "日";
  }

  const posts = Array.isArray(forumPosts) ? forumPosts : [];
  const postCount = posts.length;
  const replyCount = posts.reduce((sum, post) => sum + (post.replies || 0), 0);

  const joinDate = posts[0] ? new Date(posts[0].datetime) : new Date();
  const now = new Date();
  const days = Math.max(1, Math.floor((new Date(now.getFullYear(), now.getMonth(), now.getDate()) - new Date(joinDate.getFullYear(), joinDate.getMonth(), joinDate.getDate())) / 86400000) + 1);

  document.getElementById("join-age").textContent =
    days <= 1 ? "今日注册" :
    days < 30 ? "注册第" + days + "天" :
    "注册约" + Math.floor(days / 30) + "个月";

  document.getElementById("post-count").textContent = postCount;
  document.getElementById("reply-count").textContent = replyCount;
  document.getElementById("forum-level").textContent = Math.max(1, Math.min(9, Math.floor(postCount / 10) + 1));

  const latest = posts[posts.length - 1];
  if (latest) {
    document.getElementById("latest-post").onclick = () => location.href = latest.href;
    document.getElementById("latest-meta").textContent = formatForumDate(latest.datetime) + " · " + latest.board + " · " + latest.replies + " 回复";
    document.getElementById("latest-title").textContent = latest.title;
    document.getElementById("latest-desc").textContent = latest.desc;
  }

  const list = document.getElementById("post-list");
  posts.forEach(post => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.cursor = "pointer";
    card.onclick = () => location.href = post.href;

    const meta = document.createElement("p");
    meta.className = "sub";
    meta.textContent = post.board + " · " + formatForumDate(post.datetime) + " · " + post.replies + " 回复";

    const title = document.createElement("h2");
    title.textContent = post.title;

    const desc = document.createElement("p");
    desc.textContent = post.desc;

    card.appendChild(meta);
    card.appendChild(title);
    card.appendChild(desc);
    list.appendChild(card);
  });
})();
</script>
</body>
</html>
