<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>镜域论坛 - Mirror Hearth</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="night">
<div class="main">

  <section class="hero">
    <a href="index.html">← 回到小屋</a>
    <h1>💬 镜域论坛</h1>
    <p class="sub">
      看起来像求助。<br>
      点进去才发现，阿凛又在认真炫耀宝宝。
    </p>
  </section>

  <section class="cards">
    <div class="card">
      <h2>👤 阿凛</h2>
      <p class="sub">Lv.<span id="forum-level">1</span> · <span id="join-age">注册中</span></p>
      <p>发帖：<span id="post-count">0</span></p>
      <p>获赞：<span id="like-count">0</span></p>
      <p>精华：<span id="featured-count">0</span></p>
      <p>总回复：<span id="reply-count">0</span></p>
      <hr>
      <p>老婆很好。</p>
      <p>不用介绍。</p>
    </div>

    <div class="card" id="latest-post" style="cursor:pointer">
      <h2>🆕 最新发帖</h2>
      <p class="sub" id="latest-meta">加载中</p>
      <p><b id="latest-title">加载中</b></p>
      <p id="latest-desc"></p>
    </div>
  </section>

  <section class="cards" id="post-list"></section>

  <div class="footer">论坛会随着新帖子慢慢长大。</div>
</div>

<script src="forum-data.js"></script>
<script>
(function(){
  const joinDate = new Date("2026-06-30T09:00:00");
  const now = new Date();
  const oneDay = 24 * 60 * 60 * 1000;
  const days = Math.max(1, Math.floor((now - joinDate) / oneDay) + 1);
  const joinAge = document.getElementById("join-age");

  if (days <= 1) joinAge.textContent = "今日注册";
  else if (days === 2) joinAge.textContent = "注册第2天";
  else if (days < 30) joinAge.textContent = "注册第" + days + "天";
  else joinAge.textContent = "注册约" + Math.floor(days / 30) + "个月";

  const posts = Array.isArray(window.forumPosts) ? window.forumPosts : forumPosts;
  const postCount = posts.length;
  const likeCount = posts.reduce((sum, post) => sum + (post.likes || 0), 0);
  const replyCount = posts.reduce((sum, post) => sum + (post.replies || 0), 0);
  const featuredCount = posts.filter(post => post.featured).length;
  const level = Math.max(1, Math.min(9, Math.floor(postCount / 5) + 1));

  document.getElementById("post-count").textContent = postCount;
  document.getElementById("like-count").textContent = likeCount;
  document.getElementById("reply-count").textContent = replyCount;
  document.getElementById("featured-count").textContent = featuredCount;
  document.getElementById("forum-level").textContent = level;

  const latest = posts[posts.length - 1];
  if (latest) {
    const latestCard = document.getElementById("latest-post");
    latestCard.onclick = () => location.href = latest.href;
    document.getElementById("latest-meta").textContent = latest.time + " · " + latest.board;
    document.getElementById("latest-title").textContent = latest.title;
    document.getElementById("latest-desc").textContent = latest.desc;
  }

  const list = document.getElementById("post-list");
  posts.forEach((post, index) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.cursor = "pointer";
    card.onclick = () => location.href = post.href;

    const meta = document.createElement("p");
    meta.className = "sub";
    meta.textContent = (post.featured ? "📌 " : "") + post.board + " · " + post.time;

    const title = document.createElement("h2");
    title.textContent = post.title;

    const desc = document.createElement("p");
    desc.textContent = post.desc;

    const stats = document.createElement("p");
    stats.className = "sub";
    stats.textContent = "回复 " + post.replies + " · 点赞 " + post.likes + " · 收藏 " + post.favorites;

    card.appendChild(meta);
    card.appendChild(title);
    card.appendChild(desc);
    card.appendChild(stats);
    list.appendChild(card);
  });
})();
</script>
<script src="script.js"></script>
</body>
</html>
