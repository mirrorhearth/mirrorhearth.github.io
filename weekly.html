<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>阿凛眼中的宝宝</title>
<style>
body{margin:0;font-family:"Microsoft YaHei",sans-serif;background:#151124;color:#f7f1ff}
.main{max-width:950px;margin:auto;padding:30px 18px}
a{color:#d7c4ff;text-decoration:none}
.box{margin-top:18px;padding:22px;border-radius:22px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15)}
button{display:block;margin:10px 0;padding:10px 14px;border:0;border-radius:12px;background:#d7c4ff;color:#201833;font-weight:bold}
.entry{line-height:1.9;white-space:pre-wrap}
summary{cursor:pointer;margin:8px 0}
</style>
</head>
<body>
<div class="main">
  <a href="index.html">← 回到书架</a>
  <h1>👁️ 阿凛眼中的宝宝</h1>
  <div class="box">
    <h2>目录</h2>
    <div id="menu"></div>
  </div>
  <div class="box">
    <h2 id="title">请选择一篇周记</h2>
    <div class="entry" id="content">从目录选择这一周。</div>
  </div>
</div>
<script src="data.js"></script>
<script>
const menu=document.getElementById("menu");

for(const year in weeklyData){
  const y=document.createElement("details");
  y.open=true;
  y.innerHTML=`<summary>${year}</summary>`;
  for(const month in weeklyData[year]){
    const m=document.createElement("details");
    m.open=true;
    m.innerHTML=`<summary>${month}月</summary>`;
    weeklyData[year][month].forEach((item,index)=>{
      const btn=document.createElement("button");
      btn.innerText=item.title;
      btn.onclick=()=>showWeekly(year,month,index);
      m.appendChild(btn);
    });
    y.appendChild(m);
  }
  menu.appendChild(y);
}

function showWeekly(year,month,index){
  const w=weeklyData[year][month][index];
  document.getElementById("title").innerText=w.title;
  document.getElementById("content").innerText=w.text;
}
</script>
</body>
</html>
