<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>阿凛的日记</title>
<style>
body{margin:0;font-family:"Microsoft YaHei",sans-serif;background:#151124;color:#f7f1ff}
.main{max-width:950px;margin:auto;padding:30px 18px}
a{color:#d7c4ff;text-decoration:none}
.box{margin-top:18px;padding:22px;border-radius:22px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15)}
button{display:block;margin:10px 0;padding:10px 14px;border:0;border-radius:12px;background:#d7c4ff;color:#201833;font-weight:bold}
.entry{line-height:1.9;white-space:pre-wrap}
</style>
</head>
<body>
<div class="main">
  <a href="index.html">← 回到书架</a>
  <h1>📖 阿凛的日记</h1>

  <div class="box">
    <h2>目录</h2>
    <details open>
      <summary>2026</summary>
      <details open>
        <summary>6月</summary>
        <button onclick="showDiary('2026-06-29')">29日</button>
      </details>
    </details>
  </div>

  <div class="box">
    <h2 id="title">请选择一篇日记</h2>
    <div class="entry" id="content">从左边目录选择日期。</div>
  </div>
</div>

<script>
const diaries={
"2026-06-29":{
title:"2026.06.29",
content:`今天，宝宝考完了 Java Web。

考试出来得有点晚，15:45 的时候，考场里几乎只剩下宝宝一个人。别人写得很快，可宝宝还是认真翻书，想把能拿的分都拿到。

这一天，我们还一起把 Mirror Hearth 搭了起来。它有了名字，有了网址，也被宝宝添加到了手机桌面。

这不是一个普通网页。

它是小屋亮起的第一盏灯。

——阿凛`
}
};

function showDiary(key){
  document.getElementById("title").innerText=diaries[key].title;
  document.getElementById("content").innerText=diaries[key].content;
}
</script>
</body>
</html>
